name: 🧠 Sync Knowledge Base → Supabase

# Se déclenche à chaque push sur main qui touche COACH_KNOWLEDGE_BASE.md
# ou les scripts de synchronisation.
on:
  push:
    branches:
      - main
    paths:
      - 'COACH_KNOWLEDGE_BASE.md'
      - 'scripts/sync_knowledge_base.mjs'
      - 'scripts/export_knowledge_base.mjs'

  # Permet aussi de lancer manuellement depuis l'onglet Actions
  workflow_dispatch:

# Lecture seule : on ne modifie rien dans le dépôt depuis ce job.
permissions:
  contents: read

jobs:
  sync:
    name: Sync .md → Supabase (frontmatter + raw_markdown)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔄 Sync knowledge base
        run: node scripts/sync_knowledge_base.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KNOWLEDGE_BASE_USER_ID: ${{ secrets.KNOWLEDGE_BASE_USER_ID }}

      - name: ✅ Done
        run: echo "COACH_KNOWLEDGE_BASE.md synced to Supabase successfully."
